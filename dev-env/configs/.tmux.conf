# Enable true color support for better color rendering in terminal
# set -g default-terminal "tmux-256color"
# set -ga terminal-overrides ",xterm-256color:Tc"

# Remove delay when pressing Esc key (improves vim/nvim responsiveness)
set -s escape-time 0

# Use Ctrl-a as the tmux prefix instead of the default Ctrl-b
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Start window numbering at 1 instead of 0 (easier to reach on keyboard)
set -g base-index 1

# Enable vi-style key bindings in copy mode
set-window-option -g mode-keys vi                                                           # Use vi keys in copy mode
bind -T copy-mode-vi v send-keys -X begin-selection                                        # Press 'v' to start visual selection (like vim)
bind -T copy-mode-vi y send-keys -X copy-pipe-no-clear 'pbcopy'   # Press 'y' to yank/copy to system clipboard and stay in copy mode

# Reload tmux configuration file with prefix + r
# Typical tmux.conf locations: ~/.tmux.conf or XDG_CONFIG_HOME/tmux/tmux.conf
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# Split panes in the current pane's working directory
bind '"' split-window -v -c '#{pane_current_path}'
bind % split-window -h -c '#{pane_current_path}'

# Navigate between panes using vim-style hjkl keys (prefix + h/j/k/l)
# -Z keeps the target pane zoomed when the current window is zoomed.
bind -r h select-pane -L -Z
bind -r j select-pane -D -Z
bind -r k select-pane -U -Z
bind -r l select-pane -R -Z

# Pane border colors
# set -g pane-border-style fg=colour240           # Inactive pane border (gray)
# set -g pane-active-border-style fg=red          # Active pane border (red)

# Dim inactive panes using Catppuccin Frappé colors
# set -g window-style 'bg=#292c3c'              # Inactive pane background (Mantle)
# set -g window-active-style 'bg=#303446'       # Active pane background (Base - matches terminal)

# ==== Useful tmux commands (built-in, no config needed) ====
# prefix + z    - Toggle pane zoom (maximize/restore current pane)
# prefix + w    - Show window list to switch between windows/sessions
# prefix + d    - Detach from current session (session keeps running in background)
# Ctrl + d      - Kill current pane (closes shell, not tmux-specific)
# tmux new-session -d   - Create new session in detached mode
